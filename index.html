<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴 문의</title>
  <meta name="google-adsense-account" content="ca-pub-9247222675222330">
  <link href="/style.css" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9247222675222330" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <div class="form-card">
      <h1>제휴 문의</h1>
      <p class="subtitle">아래 양식을 작성해 주시면 검토 후 빠르게 연락드리겠습니다.</p>

      <form id="affiliate-form" action="https://formspree.io/f/mwvwpbdo" method="POST">
        <div class="form-group">
          <label for="name">이름 / 담당자명 <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="홍길동" required />
        </div>

        <div class="form-group">
          <label for="company">회사 / 브랜드명 <span class="required">*</span></label>
          <input type="text" id="company" name="company" placeholder="(주)예시회사" required />
        </div>

        <div class="form-group">
          <label for="email">이메일 <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="example@company.com" required />
        </div>

        <div class="form-group">
          <label for="phone">연락처</label>
          <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" />
        </div>

        <div class="form-group">
          <label for="type">제휴 유형 <span class="required">*</span></label>
          <select id="type" name="type" required>
            <option value="" disabled selected>선택해 주세요</option>
            <option value="광고">광고 제휴</option>
            <option value="콘텐츠">콘텐츠 제휴</option>
            <option value="공동마케팅">공동 마케팅</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">문의 내용 <span class="required">*</span></label>
          <textarea id="message" name="message" rows="5" placeholder="제휴 목적 및 세부 내용을 자유롭게 작성해 주세요." required></textarea>
        </div>

        <button type="submit" id="submit-btn">문의 보내기</button>
      </form>

      <div id="success-msg" class="success-msg hidden">
        제휴 문의가 접수되었습니다. 감사합니다!<br>빠른 시일 내에 연락드리겠습니다.
      </div>
    </div>
  </div>

  <!-- AdSense 광고 (폼 하단) -->
  <div class="container">
    <div class="ad-slot">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-9247222675222330"
           data-ad-slot="auto"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <div class="container">
    <div class="disqus-card">
      <h2 class="disqus-title">댓글</h2>
      <div id="disqus_thread"></div>
      <script>
        (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://woojinteset.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
        })();
      </script>
      <noscript>댓글을 보려면 JavaScript를 활성화해 주세요. <a href="https://disqus.com/?ref_noscript">Disqus 댓글</a></noscript>
    </div>
  </div>

  <script src="/main.js" defer></script>
</body>
</html>
